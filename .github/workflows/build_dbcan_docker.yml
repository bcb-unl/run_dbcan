name: Build and Publish dbCAN Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git tag or branch to build (e.g. v5.2.9 or master)
        required: true
        default: master
      push_image:
        description: Push image to GHCR
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_DIR: docker

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve git ref and version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ inputs.ref }}"
          else
            REF="${{ github.event.release.tag_name }}"
          fi
          BUILD_VERSION="${REF#v}"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building ref=${REF} dbcan version=${BUILD_VERSION}"

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.version.outputs.ref }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{ github.event_name == 'release' }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.DOCKER_DIR }}/Dockerfile
          push: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.push_image) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.build_version }}

      - name: Verify dbcan version in image (linux/amd64)
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.push_image)
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | grep -E ':[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 | cut -d: -f2)
          if [ -z "${TAG}" ]; then
            TAG="${{ steps.version.outputs.build_version }}"
          fi
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          echo "Smoke test image: ${IMAGE}"
          docker run --rm --platform linux/amd64 "${IMAGE}" run_dbcan --help > /dev/null
          INSTALLED=$(docker run --rm --platform linux/amd64 "${IMAGE}" \
            python -c "import importlib.metadata as m; print(m.version('dbcan'))")
          EXPECT="${{ steps.version.outputs.build_version }}"
          echo "Installed dbcan: ${INSTALLED} (expected ${EXPECT})"
          test "${INSTALLED}" = "${EXPECT}"

      - name: Docker image inspection
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.push_image)
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | grep -E ':[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 | cut -d: -f2)
          if [ -z "${TAG}" ]; then
            TAG="${{ steps.version.outputs.build_version }}"
          fi
          docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"

      - name: Update deployment status
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.push_image)
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | grep -E ':[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 | cut -d: -f2)
          if [ -z "${TAG}" ]; then
            TAG="${{ steps.version.outputs.build_version }}"
          fi
          echo "Successfully deployed version ${TAG}"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
